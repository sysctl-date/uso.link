{{ template "head.html" . }}

<body>{{ template "header.html" . }}

<div class="container">
    <div class="row">
        <div class="col-md-12">
            <div class="accordion" id="accordion2">
                <div class="accordion-group">
                    <header class="tool-head">
                        <h1>历史上的今天</h1>

                    </header>
                    <div class="panel">
                            <div class="panel panel-default">

                                        历史上的今天 <span class="greentag">{:date('Y年m月d日')}</span>
                                    </h3>
                                </div>
                                <table class="table table-bordered table-striped">
                                    
                                </table>
                            </div>
                    </div>
                </div>
                <article class="tool-doc"><h2>关于这份清单</h2><p>这里列出的是历史上发生在今天这一天的事件，按发生日期先后排列。日期会随当天自动更新，每天看到的内容都不一样。</p></article>
                <div class="accordion-group"></div>
            </div>
        </div>
    </div>
</div>
